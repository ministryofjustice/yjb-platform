name: Build & push docker image and deploy to environment

on:
  workflow_call:
    inputs:
      environment:
        description: Environment
        required: true
        type: string
      app_version:
        description: App version
        required: true
        type: string
      k8s_deployment_name:
        description: Kubernetes deployment name
        required: false
        default: ${{ github.event.repository.name }}
        type: string
      changelog_git_paths:
        description: Changelog git paths
        required: false
        default: ""
        type: string
      show_changelog:
        description: Show changelog
        default: true
        required: false
        type: boolean
      slack_notification:
        description: Slack notification
        default: "false"
        required: false
        type: string
      helm_additional_args:
        description: Helm additional args
        default: ""
        required: false
        type: string
      helm_timeout:
        description: Helm timeout
        default: "5m"
        required: false
        type: string
      helm_dir:
        description: Helm dir
        default: "helm_deploy"
        required: false
        type: string
      helm_chart_name:
        description: Name of the helm chart - defaults to the repo name
        required: false
        default: ${{ github.event.repository.name }}
        type: string
      autogenerate_scheduled_downtime_cron:
        description: |
          Whether to autogenerate scheduled downtime cron values.
          For services that have enabled "scheduledDowntime".
          This will override the "startup" and "shutdown" cron values and set them during Helm install/upgrade.
          Ensures startups and shutdowns are randomly spaced out to avoid cluster scheduling issues.
          Startup times are between 6am-7am. Shutdown times are between 9pm-10pm.
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:

  deploy_env:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/tool-installers/setup-helm@97eeedc606b4ce163133d203259a71698c9ad34b # v1.0.16
      - uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/tool-installers/setup-kubectl@97eeedc606b4ce163133d203259a71698c9ad34b # v1.0.16
      - uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/build-test-and-deploy/cloud-platform-auth@97eeedc606b4ce163133d203259a71698c9ad34b # v1.0.16
        with:
          api: https://${{ secrets.KUBE_CLUSTER }}
          cert: ${{ secrets.KUBE_CERT }}
          cluster: ${{ secrets.KUBE_CLUSTER }}
          namespace: ${{ secrets.KUBE_NAMESPACE }}
          token: ${{ secrets.KUBE_TOKEN }}
      - name: Set Slack Channel ID
        id: set-slack-channel-id
        run: |
          if [[ "${{ inputs.environment }}" == "prod" || "${{ inputs.environment }}" == "production" ]]; then
            echo "slack_channel_id=${{ vars.PROD_RELEASES_SLACK_CHANNEL }}" | tee -a $GITHUB_OUTPUT
          else
            echo "slack_channel_id=${{ vars.NONPROD_RELEASES_SLACK_CHANNEL }}" | tee -a $GITHUB_OUTPUT
          fi

